<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernesto Investing AI - LSTM Regressor</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">Ernesto Investing AI</a>
    <div class="nav-links">
        <a href="index.html">Portal</a>
        <a href="modulo_mercado.html">Mercado</a>
        <a href="modulo_svc.html">SVC</a>
        <a href="modulo_rnns.html">RNN</a>
        <a href="modulo_lstm_regressor.html">LSTM Regressor</a>
    </div>
    <div class="connection loading" id="connectionStatus">🟡 Verificando...</div>
</nav>

<div class="container">

    <div class="panel">
        <div class="title">Pronóstico de Precios - LSTM Regressor</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 15px;">
            <select id="tickerSelect" onchange="cargarDatos()">
                <option value="FSM">FSM - Fortuna Silver Mines</option>
                <option value="VOLCABC1.LM">VOLCABC1.LM - Volcan Compañía Minera</option>
                <option value="ABX.TO">ABX.TO - Barrick Gold</option>
                <option value="BVN">BVN - Buenaventura</option>
                <option value="BHP">BHP - BHP Billiton</option>
            </select>
            <select id="horizonteSelect" onchange="cargarDatos()">
                <option value="7">7 días</option>
                <option value="14">14 días</option>
                <option value="30" selected>30 días</option>
                <option value="60">60 días</option>
            </select>
            <button onclick="cargarDatos()">Actualizar</button>
        </div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <div class="panel">
        <div class="title">Métricas del Modelo</div>
        <table id="tablaMetricas">
            <tr>
                <th>RMSE (USD)</th>
                <th>RMSE (%)</th>
                <th>MAE (USD)</th>
                <th>R²</th>
                <th>Predicción Horizonte</th>
            </tr>
            <tr>
                <td id="mRmseUsd">--</td>
                <td id="mRmsePct">--</td>
                <td id="mMae">--</td>
                <td id="mR2">--</td>
                <td id="mPrediccion">--</td>
            </tr>
        </table>
    </div>

    <div class="panel">
        <div class="title">Precio Real vs Predicción (Test) + Proyección Futura</div>
        <div id="graficoPrediccion" class="chart"></div>
    </div>

</div>

<script src="assets/api-client.js"></script>
<script>

function mostrarError(mensaje) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerHTML = `❌ ${mensaje}`;
    errorDiv.style.display = 'block';
}

function ocultarError() {
    document.getElementById('errorMessage').style.display = 'none';
}

function actualizarEstadoConexion(estado) {
    const statusDiv = document.getElementById('connectionStatus');
    if (estado === 'ok') {
        statusDiv.innerHTML = '🟢 Conectado';
        statusDiv.className = 'connection ok';
    } else if (estado === 'error') {
        statusDiv.innerHTML = '🔴 Error de conexión';
        statusDiv.className = 'connection error';
    } else {
        statusDiv.innerHTML = '🟡 Verificando...';
        statusDiv.className = 'connection loading';
    }
}

async function cargarDatos() {
    ocultarError();
    const ticker = document.getElementById('tickerSelect').value;
    const horizonte = document.getElementById('horizonteSelect').value;

    document.getElementById('graficoPrediccion').innerHTML = '<div class="loading">Cargando...</div>';

    try {
        const datos = await ApiClient.obtenerLSTMRegressor(ticker, horizonte);
        actualizarEstadoConexion('ok');

        mostrarMetricas(datos);
        dibujarPrediccion(datos, ticker, horizonte);

    } catch (error) {
        actualizarEstadoConexion('error');
        mostrarError(error.message);
        document.getElementById('graficoPrediccion').innerHTML = '';
    }
}

function mostrarMetricas(datos) {
    const m = datos.metricas;
    document.getElementById('mRmseUsd').textContent = '$' + m.rmse_usd;
    document.getElementById('mRmsePct').textContent = m.rmse_pct + '%';
    document.getElementById('mMae').textContent = '$' + m.mae_usd;
    document.getElementById('mR2').textContent = m.r2;
    document.getElementById('mPrediccion').textContent = '$' + datos.prediccion_horizonte.precio;
}

function dibujarPrediccion(datos, ticker, horizonte) {
    // Eje X para el test: fechas reales
    const fechasTest = datos.fechas_test;

    // Eje X para el futuro: días consecutivos numerados desde el último día del test
    const diasFuturos = Array.from({length: datos.serie_futura_completa.length}, (_, i) => `+${i + 1}d`);

    const bandaSuperior = new Array(datos.serie_futura_completa.length).fill(datos.prediccion_horizonte.banda_superior);
    const bandaInferior = new Array(datos.serie_futura_completa.length).fill(datos.prediccion_horizonte.banda_inferior);

    Plotly.newPlot('graficoPrediccion', [
        {
            x: fechasTest,
            y: datos.precios_reales_test,
            mode: 'lines',
            name: 'Precio Real (Test)',
            line: { color: '#1F3864', width: 2 }
        },
        {
            x: fechasTest,
            y: datos.precios_predichos_test,
            mode: 'lines',
            name: 'Predicción (Test)',
            line: { color: '#C5961A', width: 2, dash: 'dash' }
        },
        {
            x: diasFuturos,
            y: datos.serie_futura_completa,
            mode: 'lines',
            name: `Proyección Futura (${horizonte}d)`,
            line: { color: '#26A69A', width: 2 }
        },
        {
            x: diasFuturos,
            y: bandaSuperior,
            mode: 'lines',
            name: 'Banda Superior (95%)',
            line: { color: '#26A69A', width: 1, dash: 'dot' },
            opacity: 0.5
        },
        {
            x: diasFuturos,
            y: bandaInferior,
            mode: 'lines',
            name: 'Banda Inferior (95%)',
            line: { color: '#26A69A', width: 1, dash: 'dot' },
            fill: 'tonexty',
            fillcolor: 'rgba(38, 166, 154, 0.1)',
            opacity: 0.5
        }
    ], {
        template: 'plotly_white',
        title: `Pronóstico de Precios - ${ticker}`,
        xaxis: { title: 'Fecha / Día proyectado' },
        yaxis: { title: 'Precio (USD)' },
        hovermode: 'x unified'
    });
}

window.addEventListener('load', cargarDatos);

</script>

</body>
</html>
