<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernesto Investing AI - Clasificador SVC</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">Ernesto Investing AI</a>
    <div class="nav-links">
        <a href="index.html">Portal</a>
        <a href="modulo_mercado.html">Mercado</a>
        <a href="modulo_svc.html">SVC</a>
        <a href="modulo_rnns.html">RNN</a>
        <a href="modulo_lstm_regressor.html">LSTM Regressor</a>
    </div>
    <div class="connection loading" id="connectionStatus">🟡 Verificando...</div>
</nav>

<div class="container">

    <div class="panel">
        <div class="title">Clasificador SVC (Support Vector Classifier)</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 15px;">
            <select id="tickerSelect" onchange="cargarDatos()">
                <option value="FSM">FSM - Fortuna Silver Mines</option>
                <option value="VOLCABC1.LM">VOLCABC1.LM - Volcan Compañía Minera</option>
                <option value="ABX.TO">ABX.TO - Barrick Gold</option>
                <option value="BVN">BVN - Buenaventura</option>
                <option value="BHP">BHP - BHP Billiton</option>
            </select>
            <button onclick="cargarDatos()">Actualizar</button>
        </div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <div class="panel">
        <div class="title">Señal Actual</div>
        <div class="signal" id="signalBox">--</div>
        <p style="text-align:center; margin-top:10px;" id="confianzaTexto"></p>
    </div>

    <div class="panel">
        <div class="title">Métricas del Modelo</div>
        <table id="tablaMetricas">
            <tr>
                <th>Accuracy</th>
                <th>Precision</th>
                <th>Recall</th>
                <th>F1-Score</th>
                <th>Kernel</th>
            </tr>
            <tr>
                <td id="mAccuracy">--</td>
                <td id="mPrecision">--</td>
                <td id="mRecall">--</td>
                <td id="mF1">--</td>
                <td id="mKernel">--</td>
            </tr>
        </table>
    </div>

    <div class="panel">
        <div class="title">Matriz de Confusión</div>
        <div id="graficoMatriz" class="chart" style="height:350px;"></div>
    </div>

    <div class="panel">
        <div class="title">Historial de Señales</div>
        <div id="graficoSenales" class="chart"></div>
    </div>

</div>

<script src="assets/api-client.js"></script>
<script>

function mostrarError(mensaje) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerHTML = `❌ ${mensaje}`;
    errorDiv.style.display = 'block';
}

function ocultarError() {
    document.getElementById('errorMessage').style.display = 'none';
}

function actualizarEstadoConexion(estado) {
    const statusDiv = document.getElementById('connectionStatus');
    if (estado === 'ok') {
        statusDiv.innerHTML = '🟢 Conectado';
        statusDiv.className = 'connection ok';
    } else if (estado === 'error') {
        statusDiv.innerHTML = '🔴 Error de conexión';
        statusDiv.className = 'connection error';
    } else {
        statusDiv.innerHTML = '🟡 Verificando...';
        statusDiv.className = 'connection loading';
    }
}

async function cargarDatos() {
    ocultarError();
    const ticker = document.getElementById('tickerSelect').value;

    document.getElementById('signalBox').textContent = '--';
    document.getElementById('signalBox').className = 'signal';
    document.getElementById('graficoMatriz').innerHTML = '<div class="loading">Cargando...</div>';
    document.getElementById('graficoSenales').innerHTML = '<div class="loading">Cargando...</div>';

    try {
        const datos = await ApiClient.obtenerSVC(ticker);
        actualizarEstadoConexion('ok');

        mostrarSenal(datos.prediccion);
        mostrarMetricas(datos.metricas);
        dibujarMatrizConfusion(datos.metricas.matriz_confusion);
        dibujarHistorialSenales(datos.prediccion);

    } catch (error) {
        actualizarEstadoConexion('error');
        mostrarError(error.message);
        document.getElementById('graficoMatriz').innerHTML = '';
        document.getElementById('graficoSenales').innerHTML = '';
    }
}

function mostrarSenal(prediccion) {
    const box = document.getElementById('signalBox');
    box.textContent = prediccion.senal_actual;
    box.className = prediccion.senal_actual === 'BUY' ? 'signal buy' : 'signal sell';

    const confianzaPct = (prediccion.confianza * 100).toFixed(1);
    document.getElementById('confianzaTexto').textContent = `Confianza del modelo: ${confianzaPct}%`;
}

function mostrarMetricas(metricas) {
    document.getElementById('mAccuracy').textContent = (metricas.accuracy * 100).toFixed(1) + '%';
    document.getElementById('mPrecision').textContent = (metricas.precision * 100).toFixed(1) + '%';
    document.getElementById('mRecall').textContent = (metricas.recall * 100).toFixed(1) + '%';
    document.getElementById('mF1').textContent = (metricas.f1 * 100).toFixed(1) + '%';
    document.getElementById('mKernel').textContent = metricas.hiperparametros.kernel;
}

function dibujarMatrizConfusion(matriz) {
    Plotly.newPlot('graficoMatriz', [{
        z: matriz,
        x: ['Predicho: SELL', 'Predicho: BUY'],
        y: ['Real: SELL', 'Real: BUY'],
        type: 'heatmap',
        colorscale: [[0, '#ffffff'], [1, '#1F3864']],
        showscale: false,
        text: matriz,
        texttemplate: '%{text}',
        textfont: { size: 20, color: '#1F3864' }
    }], {
        template: 'plotly_white',
        title: 'Matriz de Confusión (Test Set)'
    });
}

function dibujarHistorialSenales(prediccion) {
    const senales = prediccion.senales_historicas;
    const conteoBuy = senales.filter(s => s === 'BUY').length;
    const conteoSell = senales.filter(s => s === 'SELL').length;

    Plotly.newPlot('graficoSenales', [{
        x: ['BUY', 'SELL'],
        y: [conteoBuy, conteoSell],
        type: 'bar',
        marker: { color: ['#26A69A', '#EF5350'] }
    }], {
        template: 'plotly_white',
        title: 'Distribución de Señales Históricas',
        yaxis: { title: 'Cantidad de días' }
    });
}

window.addEventListener('load', cargarDatos);

</script>

</body>
</html>
