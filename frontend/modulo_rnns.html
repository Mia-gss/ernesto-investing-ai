<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernesto Investing AI - Comparador RNN</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">Ernesto Investing AI</a>
    <div class="nav-links">
        <a href="index.html">Portal</a>
        <a href="modulo_mercado.html">Mercado</a>
        <a href="modulo_svc.html">SVC</a>
        <a href="modulo_rnns.html">RNN</a>
        <a href="modulo_lstm_regressor.html">LSTM Regressor</a>
    </div>
    <div class="connection loading" id="connectionStatus">🟡 Verificando...</div>
</nav>

<div class="container">

    <div class="panel">
        <div class="title">Comparador de Clasificadores RNN</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 15px;">
            <select id="tickerSelect" onchange="cargarDatos()">
                <option value="FSM">FSM - Fortuna Silver Mines</option>
                <option value="VOLCABC1.LM">VOLCABC1.LM - Volcan Compañía Minera</option>
                <option value="ABX.TO">ABX.TO - Barrick Gold</option>
                <option value="BVN">BVN - Buenaventura</option>
                <option value="BHP">BHP - BHP Billiton</option>
            </select>
            <button onclick="cargarDatos()">Actualizar</button>
        </div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <div class="panel">
        <div class="title">Señales por Modelo</div>
        <div class="card-grid" id="senalesGrid">
            <div class="loading">Cargando...</div>
        </div>
    </div>

    <div class="panel">
        <div class="title">Comparación de Métricas</div>
        <table id="tablaComparativa">
            <tr>
                <th>Modelo</th>
                <th>Accuracy</th>
                <th>Precision</th>
                <th>Recall</th>
                <th>F1-Score</th>
            </tr>
        </table>
    </div>

    <div class="panel">
        <div class="title">Gráfico Radar - Comparación de Modelos</div>
        <div id="graficoRadar" class="chart"></div>
    </div>

</div>

<script src="assets/api-client.js"></script>
<script>

const NOMBRES_MODELOS = ['LSTM', 'BiLSTM', 'GRU', 'SimpleRNN'];

function mostrarError(mensaje) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerHTML = `❌ ${mensaje}`;
    errorDiv.style.display = 'block';
}

function ocultarError() {
    document.getElementById('errorMessage').style.display = 'none';
}

function actualizarEstadoConexion(estado) {
    const statusDiv = document.getElementById('connectionStatus');
    if (estado === 'ok') {
        statusDiv.innerHTML = '🟢 Conectado';
        statusDiv.className = 'connection ok';
    } else if (estado === 'error') {
        statusDiv.innerHTML = '🔴 Error de conexión';
        statusDiv.className = 'connection error';
    } else {
        statusDiv.innerHTML = '🟡 Verificando...';
        statusDiv.className = 'connection loading';
    }
}

async function cargarDatos() {
    ocultarError();
    const ticker = document.getElementById('tickerSelect').value;

    document.getElementById('senalesGrid').innerHTML = '<div class="loading">Cargando...</div>';
    document.getElementById('graficoRadar').innerHTML = '<div class="loading">Cargando...</div>';

    try {
        const datos = await ApiClient.obtenerRNNs(ticker);
        actualizarEstadoConexion('ok');

        mostrarSenales(datos);
        mostrarTablaComparativa(datos);
        dibujarRadar(datos);

    } catch (error) {
        actualizarEstadoConexion('error');
        mostrarError(error.message);
        document.getElementById('senalesGrid').innerHTML = '';
        document.getElementById('graficoRadar').innerHTML = '';
    }
}

function mostrarSenales(datos) {
    const grid = document.getElementById('senalesGrid');
    grid.innerHTML = '';

    NOMBRES_MODELOS.forEach(modelo => {
        if (!datos[modelo]) return;

        const pred = datos[modelo].prediccion;
        const claseSignal = pred.senal_actual === 'BUY' ? 'buy' : 'sell';
        const confianzaPct = (pred.confianza * 100).toFixed(1);

        const card = document.createElement('div');
        card.className = 'panel';
        card.style.margin = '0';
        card.innerHTML = `
            <div class="title" style="text-align:center;">${modelo}</div>
            <div class="signal ${claseSignal}" style="font-size:20px;">${pred.senal_actual}</div>
            <p style="text-align:center; margin-top:8px;">Confianza: ${confianzaPct}%</p>
        `;
        grid.appendChild(card);
    });
}

function mostrarTablaComparativa(datos) {
    const tabla = document.getElementById('tablaComparativa');
    tabla.innerHTML = `
        <tr>
            <th>Modelo</th>
            <th>Accuracy</th>
            <th>Precision</th>
            <th>Recall</th>
            <th>F1-Score</th>
        </tr>
    `;

    NOMBRES_MODELOS.forEach(modelo => {
        if (!datos[modelo]) return;
        const m = datos[modelo].metricas;

        const fila = document.createElement('tr');
        fila.innerHTML = `
            <td><strong>${modelo}</strong></td>
            <td>${(m.accuracy * 100).toFixed(1)}%</td>
            <td>${(m.precision * 100).toFixed(1)}%</td>
            <td>${(m.recall * 100).toFixed(1)}%</td>
            <td>${(m.f1 * 100).toFixed(1)}%</td>
        `;
        tabla.appendChild(fila);
    });
}

function dibujarRadar(datos) {
    const categorias = ['Accuracy', 'Precision', 'Recall', 'F1-Score'];
    const trazas = [];

    const colores = {
        'LSTM': '#1F3864',
        'BiLSTM': '#C5961A',
        'GRU': '#26A69A',
        'SimpleRNN': '#800000'
    };

    NOMBRES_MODELOS.forEach(modelo => {
        if (!datos[modelo]) return;
        const m = datos[modelo].metricas;

        trazas.push({
            type: 'scatterpolar',
            r: [m.accuracy, m.precision, m.recall, m.f1, m.accuracy],
            theta: [...categorias, categorias[0]],
            fill: 'toself',
            name: modelo,
            line: { color: colores[modelo] }
        });
    });

    Plotly.newPlot('graficoRadar', trazas, {
        template: 'plotly_white',
        polar: {
            radialaxis: { visible: true, range: [0, 1] }
        },
        title: 'Comparación Multidimensional de Modelos'
    });
}

window.addEventListener('load', cargarDatos);

</script>

</body>
</html>
