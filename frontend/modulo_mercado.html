<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernesto Investing AI - Mercado</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">Ernesto Investing AI</a>
    <div class="nav-links">
        <a href="index.html">Portal</a>
        <a href="modulo_mercado.html">Mercado</a>
        <a href="modulo_svc.html">SVC</a>
        <a href="modulo_rnns.html">RNN</a>
        <a href="modulo_lstm_regressor.html">LSTM Regressor</a>
    </div>
    <div class="connection loading" id="connectionStatus">🟡 Verificando...</div>
</nav>

<div class="container">

    <div class="panel">
        <div class="title">Datos de Mercado</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 15px;">
            <select id="tickerSelect" onchange="cargarDatos()">
                <option value="FSM">FSM - Fortuna Silver Mines</option>
                <option value="VOLCABC1.LM">VOLCABC1.LM - Volcan Compañía Minera</option>
                <option value="ABX.TO">ABX.TO - Barrick Gold</option>
                <option value="BVN">BVN - Buenaventura</option>
                <option value="BHP">BHP - BHP Billiton</option>
            </select>
            <button onclick="cargarDatos()">Actualizar</button>
        </div>
        <div class="error-message" id="errorMessage"></div>
        <div id="graficoPrecios" class="chart">
            <div class="loading">Selecciona un ticker y presiona Actualizar...</div>
        </div>
    </div>

    <div class="panel">
        <div class="title">Indicadores Técnicos</div>
        <div id="graficoIndicadores" class="chart"></div>
    </div>

</div>

<script src="assets/api-client.js"></script>
<script>

function mostrarError(mensaje) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerHTML = `❌ ${mensaje}`;
    errorDiv.style.display = 'block';
}

function ocultarError() {
    document.getElementById('errorMessage').style.display = 'none';
}

function actualizarEstadoConexion(estado) {
    const statusDiv = document.getElementById('connectionStatus');
    if (estado === 'ok') {
        statusDiv.innerHTML = '🟢 Conectado';
        statusDiv.className = 'connection ok';
    } else if (estado === 'error') {
        statusDiv.innerHTML = '🔴 Error de conexión';
        statusDiv.className = 'connection error';
    } else {
        statusDiv.innerHTML = '🟡 Verificando...';
        statusDiv.className = 'connection loading';
    }
}

async function cargarDatos() {
    ocultarError();
    const ticker = document.getElementById('tickerSelect').value;

    document.getElementById('graficoPrecios').innerHTML = '<div class="loading">Cargando...</div>';
    document.getElementById('graficoIndicadores').innerHTML = '<div class="loading">Cargando...</div>';

    try {
        const datos = await ApiClient.obtenerMercado(ticker);
        actualizarEstadoConexion('ok');

        dibujarPrecios(datos);
        dibujarIndicadores(datos);

    } catch (error) {
        actualizarEstadoConexion('error');
        mostrarError(error.message);
        document.getElementById('graficoPrecios').innerHTML = '';
        document.getElementById('graficoIndicadores').innerHTML = '';
    }
}

function dibujarPrecios(datos) {
    Plotly.newPlot('graficoPrecios', [
        {
            x: datos.fechas,
            y: datos.close,
            mode: 'lines',
            name: 'Precio de Cierre',
            line: { color: '#1F3864', width: 2 }
        },
        {
            x: datos.fechas,
            y: datos.sma20,
            mode: 'lines',
            name: 'SMA 20',
            line: { color: '#C5961A', width: 1.5, dash: 'dot' }
        },
        {
            x: datos.fechas,
            y: datos.sma50,
            mode: 'lines',
            name: 'SMA 50',
            line: { color: '#800000', width: 1.5, dash: 'dot' }
        }
    ], {
        template: 'plotly_white',
        title: `Precio de Cierre - ${datos.ticker}`,
        xaxis: { title: 'Fecha' },
        yaxis: { title: 'Precio (USD)' },
        hovermode: 'x unified'
    });
}

function dibujarIndicadores(datos) {
    Plotly.newPlot('graficoIndicadores', [
        {
            x: datos.fechas,
            y: datos.rsi,
            mode: 'lines',
            name: 'RSI (14)',
            yaxis: 'y1',
            line: { color: '#26A69A', width: 2 }
        },
        {
            x: datos.fechas,
            y: datos.macd,
            mode: 'lines',
            name: 'MACD',
            yaxis: 'y2',
            line: { color: '#EF5350', width: 2 }
        }
    ], {
        template: 'plotly_white',
        title: 'RSI y MACD',
        xaxis: { title: 'Fecha' },
        yaxis: { title: 'RSI', domain: [0.55, 1] },
        yaxis2: { title: 'MACD', domain: [0, 0.45] },
        grid: { rows: 2, columns: 1, pattern: 'independent' },
        hovermode: 'x unified'
    });
}

window.addEventListener('load', cargarDatos);

</script>

</body>
</html>
